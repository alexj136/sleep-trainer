<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3b6ea5">
  <meta name="description" content="Configure a toddler sleep trainer for your old phone">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="images/day.png">
  <link rel="apple-touch-icon" href="images/day.png">
  <title>Sleep Trainer — Setup</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <main class="config">
    <h1>Sleep Trainer</h1>
    <p class="subtitle">Turn an old phone into a gentle wake-up clock.</p>

    <form id="config-form">
      <div class="field">
        <label for="wake">Wake time</label>
        <input type="time" id="wake" name="wake" value="07:00" required>
        <p class="hint">When it's OK to get up</p>
      </div>

      <div class="field">
        <label for="sunrise">Sunrise duration (minutes)</label>
        <input type="number" id="sunrise" name="sunrise" value="30" min="0" max="120" required>
        <p class="hint">Minutes to show dawn before wake time (0 = night until wake)</p>
      </div>

      <div class="field">
        <label for="theme">Theme</label>
        <select id="theme" name="theme"></select>
      </div>

      <button type="submit" class="btn-start">Start</button>
    </form>

    <div class="url-preview">
      <p>Trainer URL</p>
      <a id="url-output" href="trainer.html?wake=07:00&sunrise=30&theme=classic"></a>
    </div>

    <p class="build-time" id="build-time" hidden></p>
  </main>

  <script type="module" src="js/index.js"></script>
</body>
</html>
